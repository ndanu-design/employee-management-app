<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>New Contact</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">New Contact</a></li>
            <li><a href="view-contact.html">View Contacts</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Add New Contact</h1>
        <form action="submit-contact.html" method="post">
            <label for="IDnumber">ID Number:</label>
            <input type="text" id="IDnumber" name="IDnumber" placeholder="Enter Identification Number"><br><br>

            <label for="fname"> First Name:</label>
            <input type="text" id="fname" name="fname" placeholder="Enter First Name" required><br><br>

            <label for="lname">Enter Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Enter Last Name" required><br><br>

            <label for="Gender">Gender:</label>
            <input type="radio" id="Male" name="Gender" value="Male">
            <label for="Male">Male</label>
            <input type="radio" id="Female" name="Gender" value="Female">
            <label for="Female">Female</label><br><br>

            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone" placeholder="+254 7--------" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter Email Address"><br><br>

            <label for="Address">Address:</label>
            <input type="text" id="Address" name="Address" placeholder="Enter Address"><br><br>

            <label for="DateOfBirth">Date of Birth:</label>
            <input type="date" id="DateOfBirth" name="DateOfBirth"><br><br>

            <label for="position">Position:</label>
            <select id="position" name="position">
                <option value="">--select Position if Official--</option>
                <option value="Manager">Manager</option>
                <option value="Developer">Developer</option>
                <option value="Employee">Employee</option>
            </select><br><br>

            <input type="submit" value="Add Contact">
        </form>
    </div>
</body>
</html>
